# https://pre-commit.com — optional; mirrors part of CI for local runs.
#   pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: smoke-imports
        name: smoke-imports
        entry: python -m scripts.tools smoke_imports
        language: system
        pass_filenames: false
      - id: pytest-fast
        name: pytest-fast
        entry: python -m pytest tests/test_scripts_tools_dispatcher.py tests/test_cli_entrypoints.py tests/test_book_project.py -q
        language: system
        pass_filenames: false